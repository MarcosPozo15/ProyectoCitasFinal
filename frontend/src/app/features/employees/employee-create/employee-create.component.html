<section class="page">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center">
      <div class="bg-info bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center me-3" style="width: 48px; height: 48px;">
        <i class="bi bi-person-plus fs-4 text-info"></i>
      </div>
      <div>
        <h1 class="mb-0 fw-bold">Nuevo empleado</h1>
        <p class="text-muted mb-0">Añade un nuevo empleado a tu equipo</p>
      </div>
    </div>
    <a class="btn btn-outline-secondary" [routerLink]="['/businesses', businessId, 'employees']">
      <i class="bi bi-arrow-left me-2"></i>Volver
    </a>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="row g-3">
          <div class="col-md-6">
            <label for="firstName" class="form-label fw-semibold">
              <i class="bi bi-person me-2"></i>Nombre
            </label>
            <input type="text" class="form-control" id="firstName" formControlName="firstName" placeholder="Juan" />
          </div>

          <div class="col-md-6">
            <label for="lastName" class="form-label fw-semibold">
              <i class="bi bi-person me-2"></i>Apellidos
            </label>
            <input type="text" class="form-control" id="lastName" formControlName="lastName" placeholder="Pérez" />
          </div>

          <div class="col-md-6">
            <label for="email" class="form-label fw-semibold">
              <i class="bi bi-envelope me-2"></i>Email
            </label>
            <input type="email" class="form-control" id="email" formControlName="email" placeholder="juan@ejemplo.com" />
          </div>

          <div class="col-md-6">
            <label for="phone" class="form-label fw-semibold">
              <i class="bi bi-telephone me-2"></i>Teléfono
            </label>
            <input type="text" class="form-control" id="phone" formControlName="phone" placeholder="600123456" />
          </div>

          <div class="col-md-6">
            <label for="jobTitle" class="form-label fw-semibold">
              <i class="bi bi-briefcase me-2"></i>Puesto
            </label>
            <input type="text" class="form-control" id="jobTitle" formControlName="jobTitle" placeholder="Estilista" />
          </div>

          <div class="col-md-6">
            <label for="colorHex" class="form-label fw-semibold">
              <i class="bi bi-palette me-2"></i>Color
            </label>
            <div class="input-group">
              <input type="text" class="form-control" id="colorHex" formControlName="colorHex" placeholder="#0d6efd" />
              <span class="input-group-text" [style.backgroundColor]="form.get('colorHex')?.value || '#0d6efd'">
                <i class="bi bi-droplet-fill text-white"></i>
              </span>
            </div>
          </div>

          <div class="col-12">
            <label for="bio" class="form-label fw-semibold">
              <i class="bi bi-text-paragraph me-2"></i>Bio
            </label>
            <textarea class="form-control" id="bio" rows="4" formControlName="bio" placeholder="Describe la experiencia y especialidades del empleado..."></textarea>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-4">
          <div class="alert alert-danger mb-0" *ngIf="errorMessage">
            <i class="bi bi-exclamation-triangle me-2"></i>
            {{ errorMessage }}
          </div>
          
          <button type="submit" class="btn btn-info btn-lg ms-auto" [disabled]="isSubmitting || form.invalid">
            <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2"></span>
            <i class="bi bi-check-circle me-2"></i>
            {{ isSubmitting ? 'Guardando...' : 'Crear empleado' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</section>

<section class="page">
  <div class="page-header">
    <h1>Negocios</h1>
    <a class="primary-link" routerLink="/businesses/new">Nuevo negocio</a>
  </div>

  <p *ngIf="isLoading">Cargando...</p>
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="grid" *ngIf="!isLoading && !errorMessage">
    <article class="card" *ngFor="let item of items">
      <h2>{{ item.name }}</h2>
      <p><strong>Slug:</strong> {{ item.slug }}</p>
      <p><strong>Email:</strong> {{ item.email || '-' }}</p>
      <p><strong>Teléfono:</strong> {{ item.phone || '-' }}</p>
      <p><strong>Estado:</strong> {{ item.status }}</p>

      <div class="actions">
        <a class="secondary-link" [routerLink]="['/businesses', item.id, 'employees']">
          Empleados
        </a>
        <a class="secondary-link" [routerLink]="['/businesses', item.id, 'services']">
          Servicios
        </a>
      </div>
    </article>
  </div>
</section>

<div class="container-fluid vh-100 p-0">
  <div class="row g-0 h-100">
    <!-- Sidebar -->
    <aside class="col-12 col-md-3 col-lg-2 bg-dark text-white d-flex flex-column p-4">
      <div class="brand fw-bold fs-4 mb-4">
        <i class="bi bi-calendar-check me-2"></i>Citas SaaS
      </div>

      <nav class="nav flex-column gap-2 flex-grow-1">
        <a routerLink="/" class="nav-link text-white d-flex align-items-center">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>

        <ng-container *ngIf="session.isSuperadmin()">
          <div class="dropdown-divider my-2"></div>
          <a routerLink="/admin/businesses" class="nav-link text-white d-flex align-items-center">
            <i class="bi bi-building me-2"></i>Negocios
          </a>
          <a routerLink="/admin/businesses/new" class="nav-link text-white d-flex align-items-center">
            <i class="bi bi-plus-circle me-2"></i>Nuevo negocio
          </a>
        </ng-container>

        <ng-container *ngIf="session.isBusinessAdmin()">
          <div class="dropdown-divider my-2"></div>
          <a routerLink="/my-business" class="nav-link text-white d-flex align-items-center">
            <i class="bi bi-shop me-2"></i>Mi negocio
          </a>
        </ng-container>
      </nav>

      <button class="btn btn-outline-light w-100 mt-auto" (click)="logout()">
        <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
      </button>
    </aside>

    <!-- Main Content -->
    <main class="col-12 col-md-9 col-lg-10 p-4 overflow-auto">
      <div class="container-fluid">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>

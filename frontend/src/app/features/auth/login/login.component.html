<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light p-4">
  <div class="card shadow-lg border-0" style="max-width: 420px; width: 100%;">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
          <i class="bi bi-person-circle fs-1 text-primary"></i>
        </div>
        <h1 class="card-title h3 mb-1 fw-bold">Iniciar sesión</h1>
        <p class="text-muted">Bienvenido de nuevo</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold">
            <i class="bi bi-envelope me-2"></i>Email
          </label>
          <input 
            type="email" 
            class="form-control form-control-lg" 
            id="email"
            formControlName="email" 
            placeholder="tu@email.com"
            [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
          />
          <div class="invalid-feedback" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
            Por favor, introduce un email válido
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">
            <i class="bi bi-lock me-2"></i>Contraseña
          </label>
          <input 
            type="password" 
            class="form-control form-control-lg" 
            id="password"
            formControlName="password" 
            placeholder="••••••••"
            [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
          />
          <div class="invalid-feedback" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
            La contraseña es obligatoria
          </div>
        </div>

        <button 
          type="submit" 
          class="btn btn-primary btn-lg w-100 fw-semibold" 
          [disabled]="isSubmitting || form.invalid"
        >
          <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2" role="status"></span>
          {{ isSubmitting ? 'Entrando...' : 'Entrar' }}
        </button>

        <div class="alert alert-danger mt-3" *ngIf="errorMessage">
          <i class="bi bi-exclamation-triangle me-2"></i>
          {{ errorMessage }}
        </div>
      </form>
    </div>
  </div>
</div>
